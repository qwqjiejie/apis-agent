services:
  app:
    restart: unless-stopped
    environment:
      APP_ENV: production
    ports: []
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"

  postgres:
    restart: unless-stopped
    ports: []

  redis:
    restart: unless-stopped
    ports: []

  minio:
    restart: unless-stopped
    ports: []

  milvus:
    restart: unless-stopped
    ports: []
